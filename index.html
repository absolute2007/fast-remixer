<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fast Remixer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <!-- Top toolbar -->
      <header id="toolbar">
        <div class="toolbar-left">
          <svg class="app-logo" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <span class="app-name">Fast Remixer</span>
        </div>
        <div class="toolbar-right">
          <button id="btn-open" class="btn btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
            Open
          </button>
          <div class="export-group">
            <select id="export-format" class="format-select" disabled>
              <option value="wav">WAV</option>
              <option value="mp3">MP3</option>
              <option value="flac">FLAC</option>
              <option value="ogg">OGG</option>
              <option value="aac">AAC</option>
            </select>
            <button id="btn-export" class="btn btn-primary" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
              Export
            </button>
          </div>
          <input type="file" id="file-input" accept="audio/*,.mp3,.wav,.flac,.ogg,.aac,.m4a,.wma,.opus,.aiff,.ape,.wv" hidden />
        </div>
      </header>

      <!-- Main content area -->
      <div id="main-layout">
        <!-- Left panel: file info -->
        <aside id="panel-info">
          <div class="panel-section">
            <div class="panel-header">File Info</div>
            <div id="file-info-content" class="info-grid">
              <div class="info-empty">No file loaded</div>
            </div>
          </div>

          <div class="panel-section">
            <div class="panel-header">BPM</div>
            <div id="bpm-section">
              <div class="bpm-display">
                <span id="bpm-value" class="bpm-number">—</span>
                <span class="bpm-label">BPM</span>
              </div>
              <button id="btn-detect-bpm" class="btn btn-sm" disabled>Detect</button>
              <div class="bpm-manual">
                <input type="number" id="bpm-manual-input" min="40" max="320" step="0.01" placeholder="BPM" disabled />
                <button id="btn-set-bpm" class="btn btn-sm" disabled>Set</button>
              </div>
              <div id="bpm-adjusted" class="bpm-adjusted-row" hidden>
                <span class="info-label">Adjusted</span>
                <span id="bpm-adjusted-value" class="info-value">—</span>
              </div>
              <div id="bpm-candidates" class="bpm-candidates" hidden></div>
            </div>
          </div>
        </aside>

        <!-- Center: waveform + controls -->
        <main id="panel-center">
          <!-- Drop zone overlay -->
          <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-content">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
              <span>Drop audio file here or click Open</span>
            </div>
          </div>

          <!-- Waveform container -->
          <div id="waveform-container" hidden>
            <div id="waveform"></div>

            <!-- Transport -->
            <div id="transport">
              <div class="transport-controls">
                <button id="btn-skip-back" class="btn-icon" title="Back 5s">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                </button>
                <button id="btn-play" class="btn-icon btn-play" title="Play/Pause">
                  <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                  <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" hidden><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <button id="btn-stop" class="btn-icon" title="Stop">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
                </button>
                <button id="btn-skip-forward" class="btn-icon" title="Forward 5s">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                </button>
              </div>
              <div class="transport-time">
                <span id="time-current">0:00</span>
                <span class="time-sep">/</span>
                <span id="time-duration">0:00</span>
              </div>
              <div class="transport-volume">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="volume-icon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <input type="range" id="slider-volume" class="remix-slider slider-volume" min="0" max="1" step="0.01" value="1" />
              </div>
            </div>
          </div>

          <!-- Remix controls -->
          <div id="remix-controls" hidden>
            <div class="panel-header">Remix</div>
            <div class="remix-grid">
              <div class="remix-row">
                <label class="remix-label" for="slider-speed">Speed</label>
                <input type="range" id="slider-speed" class="remix-slider" min="0.25" max="3" step="0.01" value="1" />
                <span id="val-speed" class="remix-value">1.00×</span>
                <button class="btn-reset" data-target="slider-speed" data-default="1" title="Reset">↺</button>
              </div>
              <div class="remix-row">
                <label class="remix-label" for="slider-pitch">Pitch</label>
                <input type="range" id="slider-pitch" class="remix-slider" min="-12" max="12" step="0.1" value="0" />
                <span id="val-pitch" class="remix-value">0 st</span>
                <button class="btn-reset" data-target="slider-pitch" data-default="0" title="Reset">↺</button>
              </div>
              <div class="remix-row">
                <label class="remix-label" for="slider-volume-main">Gain</label>
                <input type="range" id="slider-volume-main" class="remix-slider" min="0" max="2" step="0.01" value="1" />
                <span id="val-volume" class="remix-value">100%</span>
                <button class="btn-reset" data-target="slider-volume-main" data-default="1" title="Reset">↺</button>
              </div>
            </div>
          </div>
        </main>

        <!-- Right panel: metadata -->
        <aside id="panel-metadata" hidden>
          <div class="panel-section">
            <div class="panel-header">Metadata</div>
            <div class="meta-form">
              <div class="meta-field">
                <label for="meta-title">Title</label>
                <input type="text" id="meta-title" placeholder="—" />
              </div>
              <div class="meta-field">
                <label for="meta-artist">Artist</label>
                <input type="text" id="meta-artist" placeholder="—" />
              </div>
              <div class="meta-field">
                <label for="meta-album">Album</label>
                <input type="text" id="meta-album" placeholder="—" />
              </div>
              <div class="meta-row-2col">
                <div class="meta-field">
                  <label for="meta-year">Year</label>
                  <input type="text" id="meta-year" placeholder="—" />
                </div>
                <div class="meta-field">
                  <label for="meta-track">Track</label>
                  <input type="text" id="meta-track" placeholder="—" />
                </div>
              </div>
              <div class="meta-field">
                <label for="meta-genre">Genre</label>
                <input type="text" id="meta-genre" placeholder="—" />
              </div>
              <div id="album-art-container" hidden>
                <label>Cover</label>
                <img id="album-art" alt="" />
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
